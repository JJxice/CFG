// Demo Review Config

// === PLAY / PAUSE ===
bind "SPACE" "demo_pause"

// === SPEED CONTROL ===
alias "+faster" "demo_timescale 4"
alias "-faster" "demo_timescale 1"
bind "MOUSE4" "+faster"
bind "MOUSE5" "+slower"

alias "+slower" "demo_timescale 0.25"
alias "-slower" "demo_timescale 1"

// === FORWARD / BACKWARD (Approximate, not precise) ===
// These are not perfect; CS2 doesn't support time rewind natively.
// You could simulate demo_goto with tick offsets if needed, but that's complex.
bind "MOUSE2" "demo_goto -7s relative; demo_resume  // Skip backward 7s and resume"

//X-ray
alias "xraytog" "xraytogon"
alias "xraytogon" "spec_show_xray 1; spec_xray_dropped_defusekits 1; spec_xray_dropped_unoccluded 1; spec_hide_players 0; cl_spec_stats 1; alias xraytog xraytogoff; echo xray on"
alias "xraytogoff" "spec_show_xray 0; spec_xray_dropped_defusekits 0; spec_xray_dropped_unoccluded 0; spec_hide_players 1; cl_spec_stats 0; alias xraytog xraytogon; echo xray off"
bind 'x' xraytog

// === DIRECT PLAYER SELECT (1-10) ===
bind "1" "spec_player 1"
bind "2" "spec_player 2"
bind "3" "spec_player 3"
bind "4" "spec_player 4"
bind "5" "spec_player 5"
bind "6" "spec_player 6"
bind "7" "spec_player 7"
bind "8" "spec_player 8"
bind "9" "spec_player 9"
bind "0" "spec_player 10"

// Optional: Set demo to start at normal speed
demo_timescale 1